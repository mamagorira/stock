<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日用品ストック管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAsSzWrA52xl_yRQ0QxtaBZ43RxV03Pnw",
  authDomain: "stock-df4e5.firebaseapp.com",
  databaseURL: "https://stock-df4e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "stock-df4e5",
  storageBucket: "stock-df4e5.firebasestorage.app",
  messagingSenderId: "179156734728",
  appId: "1:179156734728:web:e8321fb410dcc04d29d2bd",
  measurementId: "G-3REVXSEJQN"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// =========================================
// 初期データ
// =========================================
const CATEGORIES_MAP = {
  'バス・ヘアケア': ['シャンプー','コンディショナー','トリートメント','ボディーソープ','洗顔'],
  'オーラルケア':   ['歯磨き粉'],
  '洗濯':           ['洗濯洗剤','柔軟剤'],
  '食品・キッチン': ['米','サランラップ','アルミホイール','くっつかないアルミホイール'],
  'トイレ・ティッシュ': ['トイレットペーパー','ティッシュペーパー','キッチンペーパー']
};

const INITIAL_ITEMS = [];
Object.keys(CATEGORIES_MAP).forEach(function(cat) {
  CATEGORIES_MAP[cat].forEach(function(name, i) {
    INITIAL_ITEMS.push({ id: cat + '_' + i, name, category: cat, stock: 2, low_threshold: 1 });
  });
});

// =========================================
// 状態（Firebaseから同期）
// =========================================
let items    = [];
let shopping = [];
let fbReady  = false;

// Firebaseからリアルタイム同期
onValue(ref(db, 'items'), function(snap) {
  const data = snap.val();
  if (data) {
    items = Object.values(data);
  } else {
    // 初回：初期データを書き込む
    const obj = {};
    INITIAL_ITEMS.forEach(function(item) { obj[item.id] = item; });
    set(ref(db, 'items'), obj);
    items = INITIAL_ITEMS;
  }
  fbReady = true;
  if (!checkQRParam()) renderInventory();
});

onValue(ref(db, 'shopping'), function(snap) {
  const data = snap.val();
  shopping = data ? Object.values(data) : [];
  renderShoppingBadge();
  // 買い物リストページが開いていれば再描画
  if (document.getElementById('page-shopping').classList.contains('active')) {
    renderShopping();
  }
  renderStats();
});

// Firebase保存
function saveItem(item) {
  set(ref(db, 'items/' + item.id), item);
}
function saveShopping(list) {
  const obj = {};
  list.forEach(function(s, i) { obj['s' + i] = s; });
  set(ref(db, 'shopping'), obj.length === 0 ? null : obj);
}
function saveShoppingArr() {
  if (shopping.length === 0) {
    set(ref(db, 'shopping'), null);
  } else {
    const obj = {};
    shopping.forEach(function(s, i) { obj['s' + i] = s; });
    set(ref(db, 'shopping'), obj);
  }
}

// =========================================
// ステータス
// =========================================
function getStatus(item) {
  if (item.stock === 0)                 return { key: 'out', label: '在庫切れ',   color: 'var(--danger)' };
  if (item.stock <= item.low_threshold) return { key: 'low', label: '残りわずか', color: 'var(--warn)' };
  return                                       { key: 'ok',  label: '在庫あり',   color: 'var(--accent)' };
}

// =========================================
// QRスキャン画面
// =========================================
function checkQRParam() {
  const params = new URLSearchParams(location.search);
  let id = params.get('item');
  if (!id) return false;
  id = decodeURIComponent(id);
  const item = items.find(i => i.id === id);
  if (!item) return false;
  renderScanPage(item);
  return true;
}

function renderScanPage(item) {
  const s = getStatus(item);
  document.body.innerHTML =
    '<style>body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}</style>' +
    '<div style="text-align:center;width:100%;max-width:360px;">' +
    '<div style="font-size:14px;color:var(--muted);margin-bottom:24px;font-weight:700;letter-spacing:2px;">STOCK.</div>' +
    '<div style="background:var(--surface);border:1px solid ' + s.color + ';border-radius:20px;padding:32px 24px;">' +
    '<div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;">' + item.category + '</div>' +
    '<div style="font-size:24px;font-weight:900;margin-bottom:20px;">' + item.name + '</div>' +
    '<div id="sp-num" style="font-family:\'DM Mono\',monospace;font-size:64px;font-weight:500;color:' + s.color + ';margin-bottom:6px;">' + item.stock + '</div>' +
    '<div id="sp-label" style="font-size:13px;color:' + s.color + ';margin-bottom:28px;font-weight:700;">' + s.label + '</div>' +
    '<div style="display:flex;flex-direction:column;gap:10px;">' +
    '<button id="sp-use-btn" style="padding:14px;background:var(--danger);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;">📦 1個使った</button>' +
    '<button id="sp-add-btn" style="padding:14px;background:var(--accent);border:none;border-radius:10px;color:#0f0f0f;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;">🛒 買い物リストに追加</button>' +
    '<button onclick="location.href=location.pathname" style="padding:12px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;">← 一覧に戻る</button>' +
    '</div></div></div>';

  document.getElementById('sp-use-btn').addEventListener('click', function() {
    item.stock = Math.max(0, item.stock - 1);
    saveItem(item);
    const ns = getStatus(item);
    document.getElementById('sp-num').textContent = item.stock;
    document.getElementById('sp-num').style.color = ns.color;
    let lbl = ns.label;
    if (item.stock === 0 && !shopping.find(x => x.id === item.id)) {
      shopping.push({ id: item.id, name: item.name, category: item.category, bought: false });
      saveShoppingArr();
      lbl = '在庫切れ → 買い物リストに追加しました';
    }
    document.getElementById('sp-label').textContent = lbl;
    document.getElementById('sp-label').style.color = ns.color;
    showToast('在庫を更新しました');
  });

  document.getElementById('sp-add-btn').addEventListener('click', function() {
    if (!shopping.find(x => x.id === item.id)) {
      shopping.push({ id: item.id, name: item.name, category: item.category, bought: false });
      saveShoppingArr();
    }
    addToAlexa(item.name);
  });
}

// =========================================
// 在庫一覧
// =========================================
function renderInventory() {
  if (!fbReady) return;
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const filtered = q ? items.filter(i => i.name.toLowerCase().includes(q) || i.category.toLowerCase().includes(q)) : items;

  let html = '';
  filtered.forEach(function(item) {
    const s = getStatus(item);
    const inList = shopping.some(x => x.id === item.id && !x.bought);
    const numClass = item.stock === 0 ? 'zero' : (item.stock <= item.low_threshold ? 'low-c' : '');
    const safeId   = item.id.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    const safeName = item.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    html +=
      '<div class="item-card ' + s.key + '">' +
      '<button class="card-delete" onclick="deleteItem(\'' + safeId + '\')">✕</button>' +
      '<div class="item-category">' + item.category + '</div>' +
      '<div class="item-name">' + item.name + '</div>' +
      '<div class="stock-row">' +
      '<button class="stock-btn minus" onclick="changeStock(\'' + safeId + '\',-1)">−</button>' +
      '<div class="stock-num ' + numClass + '">' + item.stock + '</div>' +
      '<button class="stock-btn plus" onclick="changeStock(\'' + safeId + '\',1)">＋</button>' +
      '<span class="stock-label">個</span>' +
      '<span class="status-pill status-' + s.key + '" style="margin-left:auto;">' + s.label + '</span>' +
      '</div>' +
      '<div class="card-actions">' +
      '<button class="card-btn" onclick="showQR(\'' + safeId + '\')">QR表示</button>' +
      '<button class="card-btn ' + (inList ? 'in-list' : '') + '" onclick="toggleShopping(\'' + safeId + '\')">' + (inList ? '✓ リスト済' : '🛒 リストへ') + '</button>' +
      '<button class="card-btn" onclick="addToAlexa(\'' + safeName + '\')" style="border-color:#1a6fa8;color:#4db8ff;">🔵 Alexa</button>' +
      '</div></div>';
  });
  document.getElementById('items-grid').innerHTML = html;
  renderStats();
  renderShoppingBadge();
}

function renderStats() {
  const low = items.filter(i => i.stock > 0 && i.stock <= i.low_threshold).length;
  const out = items.filter(i => i.stock === 0).length;
  const lst = shopping.filter(s => !s.bought).length;
  const el = document.getElementById('stats-row');
  if (!el) return;
  el.innerHTML =
    '<div class="stat-box"><div class="stat-num c-accent">' + items.length + '</div><div class="stat-label">全商品</div></div>' +
    '<div class="stat-box"><div class="stat-num c-warn">'   + low + '</div><div class="stat-label">残りわずか</div></div>' +
    '<div class="stat-box"><div class="stat-num c-danger">' + out + '</div><div class="stat-label">在庫切れ</div></div>' +
    '<div class="stat-box"><div class="stat-num c-blue">'   + lst + '</div><div class="stat-label">買い物リスト</div></div>';
}

// =========================================
// 在庫操作
// =========================================
window.changeStock = function(id, delta) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.stock = Math.max(0, item.stock + delta);
  saveItem(item);
  if (item.stock === 0 && !shopping.find(s => s.id === id)) {
    shopping.push({ id, name: item.name, category: item.category, bought: false });
    saveShoppingArr();
    showToast(item.name + ' を買い物リストに追加しました');
  }
};

window.toggleShopping = function(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const idx = shopping.findIndex(s => s.id === id && !s.bought);
  if (idx >= 0) {
    shopping.splice(idx, 1);
    showToast(item.name + ' をリストから削除しました');
  } else {
    shopping.push({ id, name: item.name, category: item.category, bought: false });
    showToast(item.name + ' を買い物リストに追加しました ✓');
  }
  saveShoppingArr();
};

window.deleteItem = function(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (!confirm('「' + item.name + '」を削除しますか？')) return;
  remove(ref(db, 'items/' + id));
  shopping = shopping.filter(s => s.id !== id);
  saveShoppingArr();
  showToast(item.name + ' を削除しました');
};

// =========================================
// 商品追加
// =========================================
window.openAddModal = function() {
  document.getElementById('add-name').value = '';
  document.getElementById('add-stock').value = 1;
  document.getElementById('add-threshold').value = 1;
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('add-name').focus(), 100);
};
window.closeAddModal = function() {
  if (isListening && recognition) recognition.stop();
  stopVoice();
  document.getElementById('add-modal').classList.remove('open');
};

window.addItem = function() {
  const name = document.getElementById('add-name').value.trim();
  if (!name) { alert('商品名を入力してください'); return; }
  const category  = document.getElementById('add-category').value;
  const stock     = Math.max(0, parseInt(document.getElementById('add-stock').value)     || 0);
  const threshold = Math.max(0, parseInt(document.getElementById('add-threshold').value) || 1);
  const id = 'item_' + Date.now();
  const newItem = { id, name, category, stock, low_threshold: threshold };
  saveItem(newItem);
  showToast(name + ' を追加しました ✓');
  window.closeAddModal();
};

// =========================================
// 買い物リスト
// =========================================
function renderShopping() {
  const list = document.getElementById('shopping-list');
  if (!list) return;
  if (shopping.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🛒</div><p>買い物リストは空です</p></div>';
    return;
  }
  list.innerHTML = shopping.map((s, i) =>
    '<div class="shopping-item ' + (s.bought ? 'bought' : '') + '">' +
    '<div class="shopping-check ' + (s.bought ? 'checked' : '') + '" onclick="toggleBought(' + i + ')">' + (s.bought ? '✓' : '') + '</div>' +
    '<div class="shopping-info">' +
    '<div class="shopping-name">' + s.name + '</div>' +
    '<div class="shopping-sub">'  + s.category + '</div>' +
    '</div>' +
    '<button class="shopping-remove" onclick="removeShoppingItem(' + i + ')">×</button>' +
    '</div>'
  ).join('');
  renderShoppingBadge();
}

window.toggleBought = function(i) {
  shopping[i].bought = !shopping[i].bought;
  if (shopping[i].bought) {
    const item = items.find(it => it.id === shopping[i].id);
    if (item) { item.stock += 1; saveItem(item); }
    showToast('購入済み！在庫を+1しました ✓');
  }
  saveShoppingArr();
  renderShopping();
  renderStats();
};

window.removeShoppingItem = function(i) {
  shopping.splice(i, 1);
  saveShoppingArr();
  renderShopping();
  renderShoppingBadge();
  renderStats();
};

window.clearBought = function() {
  shopping = shopping.filter(s => !s.bought);
  saveShoppingArr();
  renderShopping();
  renderShoppingBadge();
  renderStats();
};

window.clearAll = function() {
  if (!confirm('買い物リストをすべてクリアしますか？')) return;
  shopping = [];
  saveShoppingArr();
  renderShopping();
  renderShoppingBadge();
  renderStats();
};

function renderShoppingBadge() {
  const count = shopping.filter(s => !s.bought).length;
  const badge = document.getElementById('shopping-badge');
  if (!badge) return;
  badge.textContent = count;
  badge.style.display = count > 0 ? 'inline-flex' : 'none';
}

// =========================================
// QRモーダル
// =========================================
let currentQRItem = null;

window.showQR = function(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  currentQRItem = item;
  const url = location.origin + location.pathname + '?item=' + encodeURIComponent(item.id);
  document.getElementById('qr-modal-name').textContent = item.name;
  document.getElementById('qr-modal-url').textContent  = url;
  const container = document.getElementById('qr-container');
  container.innerHTML = '';
  new QRCode(container, { text: url, width: 200, height: 200, colorDark: '#000', colorLight: '#fff' });
  document.getElementById('qr-modal').classList.add('open');
};
window.closeQRModal  = function() { document.getElementById('qr-modal').classList.remove('open'); };
window.downloadQR = function() {
  const canvas = document.querySelector('#qr-container canvas');
  if (!canvas) return;
  const a = document.createElement('a');
  a.download = 'qr-' + currentQRItem.name + '.png';
  a.href = canvas.toDataURL();
  a.click();
};

// =========================================
// QRシート印刷
// =========================================
window.printQRSheet = function() {
  window.closeEmailModal();
  const win = window.open('', '_blank');
  const rows = items.map(i => ({ id: i.id, name: i.name, category: i.category, url: location.origin + location.pathname + '?item=' + encodeURIComponent(i.id) }));
  const cells   = rows.map(i => '<div class="cell"><div class="cat">' + i.category + '</div><div class="name">' + i.name + '</div><div class="qr" id="q' + i.id + '"></div></div>').join('');
  const scripts = rows.map(i => 'new QRCode(document.getElementById("q' + i.id + '"),{text:"' + i.url + '",width:100,height:100});').join('\n');
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>日用品 QRシート</title>' +
    '<style>body{font-family:sans-serif;padding:20px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}' +
    '.cell{border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center;break-inside:avoid}' +
    '.cat{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}' +
    '.name{font-size:13px;font-weight:700;margin-bottom:8px}.qr{display:flex;justify-content:center}' +
    '.pbtn{margin-bottom:16px;padding:10px 20px;cursor:pointer;font-size:14px;background:#c8f060;border:none;border-radius:6px;font-weight:700}' +
    '@media print{.pbtn{display:none}}</style>' +
    '<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>' +
    '</head><body><h1>日用品 QRシート</h1><p style="color:#999;font-size:12px;margin-bottom:20px">作成日: ' + new Date().toLocaleDateString('ja-JP') + '</p>' +
    '<button class="pbtn" onclick="window.print()">🖨 印刷する</button>' +
    '<div class="grid">' + cells + '</div><script>' + scripts + '<\/script></body></html>');
  win.document.close();
};

// =========================================
// メール送信
// =========================================
window.openEmailModal  = function() { document.getElementById('email-modal').classList.add('open'); };
window.closeEmailModal = function() { document.getElementById('email-modal').classList.remove('open'); };

window.sendEmail = function() {
  const email = document.getElementById('email-input').value.trim();
  if (!email || !email.includes('@')) { alert('正しいメールアドレスを入力してください'); return; }
  const rows    = items.map(i => ({ id: i.id, name: i.name, category: i.category, url: location.origin + location.pathname + '?item=' + encodeURIComponent(i.id) }));
  const cells   = rows.map(i => '<div class="cell"><div class="cat">' + i.category + '</div><div class="name">' + i.name + '</div><div class="qr" id="q' + i.id + '"></div></div>').join('');
  const scripts = rows.map(i => 'new QRCode(document.getElementById("q' + i.id + '"),{text:"' + i.url + '",width:100,height:100});').join('\n');
  const html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>日用品 QRシート</title>' +
    '<style>body{font-family:sans-serif;padding:20px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}' +
    '.cell{border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center;break-inside:avoid}' +
    '.cat{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}' +
    '.name{font-size:13px;font-weight:700;margin-bottom:8px}.qr{display:flex;justify-content:center}' +
    '.pbtn{margin-bottom:16px;padding:10px 20px;cursor:pointer;font-size:14px;background:#c8f060;border:none;border-radius:6px;font-weight:700}' +
    '@media print{.pbtn{display:none}}</style>' +
    '<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>' +
    '</head><body><h1>日用品 QRシート</h1><p style="color:#999;font-size:12px;margin-bottom:20px">作成日: ' + new Date().toLocaleDateString('ja-JP') + '</p>' +
    '<button class="pbtn" onclick="window.print()">🖨 印刷する</button>' +
    '<div class="grid">' + cells + '</div><script>' + scripts + '<\/script></body></html>';
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'QRシート.html';
  a.click();
  setTimeout(function() {
    const subject = encodeURIComponent('日用品 QRシート');
    const body    = encodeURIComponent('ダウンロードされた「QRシート.html」を添付して送信してください。\n\nパソコンで受信後、ブラウザで開き「🖨 印刷する」ボタンで印刷できます。');
    location.href = 'mailto:' + email + '?subject=' + subject + '&body=' + body;
    window.closeEmailModal();
    showToast('ファイルを保存しました。メールに添付して送信してください ✓');
  }, 500);
};

// =========================================
// Alexa連携
// =========================================
window.addToAlexa = function(itemName) {
  // 商品名をクリップボードにコピー
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(itemName).then(function() {
      showToast('「' + itemName + '」をコピーしました ✓');
    }).catch(function() {
      showToast(itemName + ' をAlexaリストに追加してください');
    });
  } else {
    // クリップボードが使えない場合
    showToast(itemName + ' をAlexaリストに追加してください');
  }
  // AmazonのAlexaリストページを開く
  setTimeout(function() {
    window.open('https://alexa.amazon.co.jp/spa/index.html#shopping-list', '_blank');
  }, 500);
};

// =========================================
// 買い物リスト：音声 & 手動追加
// =========================================
let slRecognition = null;
let slListening   = false;

window.toggleShoppingVoice = function() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('お使いのブラウザは音声入力に対応していません。\nChrome または Safari をお使いください。'); return; }
  if (slListening) { if (slRecognition) slRecognition.stop(); stopShoppingVoice(); }
  else { slRecognition = initShoppingVoice(); if (slRecognition) slRecognition.start(); }
};

function initShoppingVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'ja-JP';
  r.interimResults = true;
  r.maxAlternatives = 1;

  r.onstart = function() {
    slListening = true;
    const btn  = document.getElementById('sl-voice-btn');
    const icon = document.getElementById('sl-voice-icon');
    const lbl  = document.getElementById('sl-voice-label');
    const hint = document.getElementById('sl-voice-hint');
    if (btn)  btn.classList.add('listening');
    if (icon) icon.textContent = '🔴';
    if (lbl)  lbl.textContent  = '聞いています…';
    if (hint) hint.textContent = '買いたいものを話してください。複数でもOK！';
  };

  r.onresult = function(e) {
    let t = '';
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    const input = document.getElementById('sl-manual-input');
    if (input) input.value = t;
    // 確定したら自動追加
    if (e.results[e.results.length - 1].isFinal) {
      addShoppingByVoice(t);
    }
  };

  r.onerror = function(e) {
    const hint = document.getElementById('sl-voice-hint');
    if (e.error === 'not-allowed') { if (hint) hint.textContent = '⚠️ マイクのアクセスが拒否されました。'; }
    else if (e.error === 'no-speech') { if (hint) hint.textContent = '声が聞こえませんでした。もう一度試してください。'; }
    stopShoppingVoice();
  };

  r.onend = function() { stopShoppingVoice(); };
  return r;
}

function stopShoppingVoice() {
  slListening = false;
  const btn  = document.getElementById('sl-voice-btn');
  const icon = document.getElementById('sl-voice-icon');
  const lbl  = document.getElementById('sl-voice-label');
  if (btn)  btn.classList.remove('listening');
  if (icon) icon.textContent = '🎤';
  if (lbl)  lbl.textContent  = 'タップして話す';
}

function addShoppingByVoice(text) {
  if (!text.trim()) return;
  // 「と」「、」「，」などで区切って複数追加に対応
  const names = text.split(/[とや、，,\s]+/).map(s => s.trim()).filter(s => s.length > 0);
  names.forEach(function(name) {
    addShoppingItem(name, 'その他');
  });
  const hint = document.getElementById('sl-voice-hint');
  const input = document.getElementById('sl-manual-input');
  if (hint)  hint.textContent = '✓ 「' + text + '」を追加しました！';
  if (input) input.value = '';
  setTimeout(function() {
    if (hint) hint.textContent = '「牛乳」「卵」など買いたいものを話してください';
  }, 3000);
}

window.addShoppingManual = function() {
  const input = document.getElementById('sl-manual-input');
  if (!input || !input.value.trim()) return;
  addShoppingItem(input.value.trim(), 'その他');
  showToast('「' + input.value.trim() + '」を追加しました ✓');
  input.value = '';
};

function addShoppingItem(name, category) {
  // すでにリストにあれば追加しない
  if (shopping.find(s => s.name === name && !s.bought)) return;
  shopping.push({ id: 'manual_' + Date.now() + '_' + Math.random(), name: name, category: category, bought: false });
  saveShoppingArr();
  renderShopping();
  renderStats();
}


let recognition = null;
let isListening  = false;

function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'ja-JP';
  r.interimResults = true;
  r.maxAlternatives = 1;
  r.onstart = function() {
    isListening = true;
    const btn = document.getElementById('voice-btn');
    const icon = document.getElementById('voice-icon');
    const lbl  = document.getElementById('voice-label');
    const hint = document.getElementById('voice-hint');
    if (btn)  btn.classList.add('listening');
    if (icon) icon.textContent = '🔴';
    if (lbl)  lbl.textContent  = '聞いています…';
    if (hint) hint.textContent = '商品名を話してください。自動で入力されます。';
  };
  r.onresult = function(e) {
    let t = '';
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    const ni = document.getElementById('add-name');
    if (ni) ni.value = t;
    if (e.results[e.results.length - 1].isFinal) guessCategory(t);
  };
  r.onerror = function(e) {
    const hint = document.getElementById('voice-hint');
    if (e.error === 'not-allowed') { if (hint) hint.textContent = '⚠️ マイクのアクセスが拒否されました。'; }
    else if (e.error === 'no-speech') { if (hint) hint.textContent = '声が聞こえませんでした。もう一度試してください。'; }
    stopVoice();
  };
  r.onend = function() {
    stopVoice();
    const hint = document.getElementById('voice-hint');
    const name = document.getElementById('add-name');
    if (name && name.value) { if (hint) hint.textContent = '✓ 「' + name.value + '」と認識しました。確認して追加してください。'; }
    else { if (hint) hint.textContent = '「シャンプー」「洗濯洗剤」など商品名を話してください'; }
  };
  return r;
}

window.toggleVoice = function() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('お使いのブラウザは音声入力に対応していません。\nChrome または Safari をお使いください。'); return; }
  if (isListening) { if (recognition) recognition.stop(); stopVoice(); }
  else { recognition = initVoice(); if (recognition) recognition.start(); }
};

function stopVoice() {
  isListening = false;
  const btn  = document.getElementById('voice-btn');
  const icon = document.getElementById('voice-icon');
  const lbl  = document.getElementById('voice-label');
  if (btn)  btn.classList.remove('listening');
  if (icon) icon.textContent = '🎤';
  if (lbl)  lbl.textContent  = 'タップして話す';
}

function guessCategory(name) {
  const map = [
    { keys: ['シャンプー','コンディショナー','トリートメント','ボディ','洗顔','バス','ヘア','リンス'], cat: 'バス・ヘアケア' },
    { keys: ['歯磨き','歯ブラシ','デンタル','オーラル'], cat: 'オーラルケア' },
    { keys: ['洗濯','柔軟'], cat: '洗濯' },
    { keys: ['米','ラップ','アルミ','キッチン'], cat: '食品・キッチン' },
    { keys: ['トイレ','ティッシュ','ペーパー'], cat: 'トイレ・ティッシュ' },
  ];
  const sel = document.getElementById('add-category');
  if (!sel) return;
  for (const m of map) {
    if (m.keys.some(k => name.includes(k))) { sel.value = m.cat; return; }
  }
}

// =========================================
// タブ切替
// =========================================
window.showTab = function(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'shopping') renderShopping();
};

// =========================================
// トースト
// =========================================
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
window.showToast = showToast;

</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {

}

.tab:hover:not(.active) { color: var(--text); }

.search-bar { margin-bottom: 16px; }
.search-bar input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s; }

.stock-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.stock-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
.stock-btn:hover { background: #333; }
.stock-btn.minus:hover { background: #3a1a1a; color: var(--danger); }

.stock-num { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; min-width: 34px; text-align: center; }

.status-ok { background: #1a3a1a; color: var(--accent); } .status-low { background: #3a2a0a; color: var(--warn); } .status-out { background: #3a0a0a; color: var(--danger); }

.card-actions { display: flex; gap: 6px; }

.card-btn:hover { border-color: var(--accent2); color: var(--accent2); }

.card-delete:hover { color: var(--danger); background: #3a0a0a; }

.btn { padding: 9px 16px; border-radius: 8px; border: none; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #0f0f0f; } .btn-primary:hover { background: #d8ff70; }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text); } .btn-ghost:hover { border-color: #555; background: var(--surface); }
.btn-danger { background: var(--danger); color: #fff; } .btn-danger:hover { background: #ff7070; }

.shopping-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }

.shopping-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); background: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 13px; font-weight: 900; color: #0f0f0f; }
.shopping-check.checked { background: var(--accent); border-color: var(--accent); }
.shopping-info { flex: 1; }
.shopping-name { font-size: 15px; font-weight: 700; }
.shopping-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }
.shopping-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; transition: color 0.2s; line-height: 1; }
.shopping-remove:hover { color: var(--danger); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 380px; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 17px; font-weight: 900; }

.modal-close:hover { color: var(--text); }

.form-group { margin-bottom: 14px; }
.form-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; display: block; margin-bottom: 6px; text-transform: uppercase; }

.form-input:focus { border-color: var(--accent); }
select.form-input { cursor: pointer; }

#qr-container { display: flex; justify-content: center; margin-bottom: 16px; padding: 16px; background: #fff; border-radius: 10px; }
.modal-info { text-align: center; margin-bottom: 16px; }
.modal-info .name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-info .url  { font-size: 10px; color: var(--muted); word-break: break-all; font-family: 'DM Mono', monospace; }

.voice-btn { width: 100%; padding: 14px; border-radius: 10px; border: 2px dashed var(--border); background: none; color: var(--muted); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 14px; }

</style>

<div class="modal-overlay" id="email-modal">
  <div class="modal">

      <button class="modal-close" onclick="closeEmailModal()">✕</button>
